name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: smena_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smena_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/smena_ci
      MIGRATION_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install PostgreSQL 18 client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            "Architectures: $(dpkg --print-architecture)" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' \
            | sudo tee /etc/apt/sources.list.d/pgdg.sources
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo '/usr/lib/postgresql/18/bin' >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run db:migrate:verify
      - run: npm run db:migrate
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run db:restore:verify
